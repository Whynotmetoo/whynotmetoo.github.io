<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="diagram-title diagram-desc">
  <title id="diagram-title">Progressive micro-frontend migration architecture</title>
  <desc id="diagram-desc">A clean architecture diagram showing a browser session entering a micro-frontend shell, which coordinates legacy pages, compatibility adapters, domain remotes, and shared platform APIs with clear spacing between grouped cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.58" stop-color="#101827"/>
      <stop offset="1" stop-color="#13233A"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(246 164) rotate(41) scale(330 250)">
      <stop stop-color="#2563EB" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1080 638) rotate(140) scale(360 260)">
      <stop stop-color="#14B8A6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shell" x1="222" y1="200" x2="1060" y2="374" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F9CF9"/>
      <stop offset="0.55" stop-color="#6D6DF6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="legacy" x1="80" y1="456" x2="410" y2="646" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="adapter" x1="475" y1="456" x2="805" y2="646" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="remote" x1="870" y1="456" x2="1200" y2="646" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-24%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.24"/>
    </filter>
    <marker id="arrowBlue" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M3 3L16 9L3 15V3Z" fill="#93C5FD"/>
    </marker>
    <marker id="arrowOrange" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M3 3L16 9L3 15V3Z" fill="#FDBA74"/>
    </marker>
    <marker id="arrowSlate" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M3 3L16 9L3 15V3Z" fill="#94A3B8"/>
    </marker>
    <style>
      .title { font: 800 36px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; letter-spacing: -0.8px; }
      .subtitle { font: 400 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #CBD5E1; }
      .section { font: 800 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFFFFF; letter-spacing: -0.3px; }
      .small { font: 600 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #EFF6FF; }
      .muted { font: 500 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #C7D2FE; }
      .body { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #E2E8F0; }
      .bodyDark { font: 700 19px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .caption { font: 600 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #94A3B8; }
      .pillText { font: 700 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #E0F2FE; }
      .darkSmall { font: 700 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1280" height="820" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="820" rx="34" fill="url(#glowBlue)"/>
  <rect width="1280" height="820" rx="34" fill="url(#glowTeal)"/>

  <text x="70" y="70" class="title">Progressive Micro-Frontend Architecture</text>
  <text x="70" y="102" class="subtitle">Modern modules can grow around legacy contracts instead of forcing a risky full rewrite.</text>

  <!-- Browser / user session -->
  <g filter="url(#softShadow)">
    <rect x="870" y="54" width="330" height="78" rx="22" fill="#F8FAFC"/>
    <circle cx="903" cy="81" r="7" fill="#EF4444"/>
    <circle cx="926" cy="81" r="7" fill="#F59E0B"/>
    <circle cx="949" cy="81" r="7" fill="#22C55E"/>
    <rect x="986" y="67" width="160" height="28" rx="14" fill="#E2E8F0"/>
    <text x="943" y="116" class="darkSmall">Browser / User Session</text>
  </g>

  <!-- Main shell -->
  <g filter="url(#shadow)">
    <rect x="220" y="202" width="840" height="172" rx="32" fill="url(#shell)"/>
    <text x="270" y="246" class="section">Micro-Frontend Shell</text>
    <text x="270" y="276" class="small">Bootstraps shared context, permissions, routing, menu composition, and runtime loading.</text>
    <g>
      <rect x="270" y="304" width="172" height="44" rx="15" fill="#FFFFFF" opacity="0.17"/>
      <text x="294" y="331" class="pillText">Boot data</text>
      <rect x="462" y="304" width="172" height="44" rx="15" fill="#FFFFFF" opacity="0.17"/>
      <text x="486" y="331" class="pillText">Global context</text>
      <rect x="654" y="304" width="172" height="44" rx="15" fill="#FFFFFF" opacity="0.17"/>
      <text x="678" y="331" class="pillText">Remote loader</text>
      <rect x="846" y="304" width="164" height="44" rx="15" fill="#FFFFFF" opacity="0.17"/>
      <text x="870" y="331" class="pillText">Shared APIs</text>
    </g>
  </g>

  <!-- Top arrow -->
  <path d="M1035 132C1012 164 982 184 944 200" stroke="#93C5FD" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="965" y="168" class="caption">entry</text>

  <!-- Lower cards -->
  <g filter="url(#shadow)">
    <rect x="80" y="456" width="330" height="190" rx="28" fill="url(#legacy)"/>
    <text x="116" y="501" class="section">Legacy Portal</text>
    <text x="116" y="529" class="body">Existing pages keep their runtime contracts.</text>
    <rect x="116" y="554" width="258" height="34" rx="12" fill="#FFFFFF" opacity="0.18"/>
    <text x="136" y="576" class="small">Legacy loader + MVC views</text>
    <rect x="116" y="596" width="258" height="34" rx="12" fill="#FFFFFF" opacity="0.18"/>
    <text x="136" y="618" class="small">Global Ajax · CSRF · locale</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="475" y="456" width="330" height="190" rx="28" fill="url(#adapter)" stroke="#475569" stroke-width="1.5"/>
    <text x="511" y="501" class="section">Compatibility Adapters</text>
    <text x="511" y="529" class="body">A narrow bridge between old and new.</text>
    <rect x="511" y="554" width="258" height="34" rx="12" fill="#FFFFFF" opacity="0.10"/>
    <text x="531" y="576" class="small">Manifest loader · global mount</text>
    <rect x="511" y="596" width="258" height="34" rx="12" fill="#FFFFFF" opacity="0.10"/>
    <text x="531" y="618" class="small">Legacy bridge · path rewrite</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="870" y="456" width="330" height="190" rx="28" fill="url(#remote)"/>
    <text x="906" y="501" class="section">Domain Remotes</text>
    <text x="906" y="529" class="body">Independently built modules exposed at runtime.</text>
    <rect x="906" y="554" width="78" height="76" rx="16" fill="#FFFFFF" opacity="0.20"/>
    <text x="927" y="583" class="small">A</text>
    <text x="923" y="607" class="muted">routes</text>
    <rect x="1000" y="554" width="78" height="76" rx="16" fill="#FFFFFF" opacity="0.20"/>
    <text x="1021" y="583" class="small">B</text>
    <text x="1018" y="607" class="muted">widgets</text>
    <rect x="1094" y="554" width="70" height="76" rx="16" fill="#FFFFFF" opacity="0.20"/>
    <text x="1113" y="583" class="small">Lib</text>
    <text x="1109" y="607" class="muted">shared</text>
  </g>

  <!-- Relationship arrows -->
  <path d="M430 372C354 396 290 419 245 450" stroke="#FDBA74" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrowOrange)"/>
  <text x="315" y="413" class="caption">legacy entry can stay alive</text>

  <path d="M640 374V450" stroke="#93C5FD" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="660" y="420" class="caption">adapter layer</text>

  <path d="M850 372C925 396 985 420 1035 450" stroke="#93C5FD" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="927" y="410" class="caption">runtime composition</text>

  <path d="M410 541H468" stroke="#FDBA74" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrowOrange)"/>
  <text x="420" y="527" class="caption">reuse</text>

  <path d="M805 541H863" stroke="#93C5FD" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="816" y="527" class="caption">load</text>

  <!-- Platform APIs -->
  <g filter="url(#softShadow)">
    <rect x="220" y="704" width="840" height="74" rx="24" fill="#E2E8F0"/>
    <text x="335" y="749" class="bodyDark">Platform APIs / Gateway / Auth / Feature Configuration</text>
  </g>
  <path d="M245 646V696" stroke="#94A3B8" stroke-width="2.6" stroke-dasharray="8 8" stroke-linecap="round" marker-end="url(#arrowSlate)"/>
  <path d="M640 646V696" stroke="#94A3B8" stroke-width="2.6" stroke-dasharray="8 8" stroke-linecap="round" marker-end="url(#arrowSlate)"/>
  <path d="M1035 646V696" stroke="#94A3B8" stroke-width="2.6" stroke-dasharray="8 8" stroke-linecap="round" marker-end="url(#arrowSlate)"/>

  <!-- Legend -->
  <g opacity="0.95">
    <rect x="70" y="746" width="118" height="34" rx="17" fill="#0F172A" stroke="#334155"/>
    <circle cx="92" cy="763" r="6" fill="#93C5FD"/>
    <text x="108" y="768" class="caption">new path</text>
  </g>
  <g opacity="0.95">
    <rect x="1092" y="746" width="118" height="34" rx="17" fill="#0F172A" stroke="#334155"/>
    <circle cx="1114" cy="763" r="6" fill="#F59E0B"/>
    <text x="1130" y="768" class="caption">legacy path</text>
  </g>
</svg>
