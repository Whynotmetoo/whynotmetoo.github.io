<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Static Publishing Pipeline</title>
  <desc id="desc">Diagram of source repo, build, and pages repo publish flow.</desc>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9f2ee" />
      <stop offset="1" stop-color="#f7fcfb" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g1)" />
  <rect x="80" y="180" width="300" height="250" rx="22" fill="#ffffff" stroke="#88b6ac" stroke-width="3" />
  <rect x="450" y="180" width="300" height="250" rx="22" fill="#ffffff" stroke="#88b6ac" stroke-width="3" />
  <rect x="820" y="180" width="300" height="250" rx="22" fill="#ffffff" stroke="#88b6ac" stroke-width="3" />
  <text x="120" y="240" font-size="32" font-family="Arial, sans-serif" fill="#1c3b34">astro_blog</text>
  <text x="120" y="286" font-size="24" font-family="Arial, sans-serif" fill="#3b5f56">source + content</text>
  <text x="520" y="240" font-size="32" font-family="Arial, sans-serif" fill="#1c3b34">GitHub Action</text>
  <text x="520" y="286" font-size="24" font-family="Arial, sans-serif" fill="#3b5f56">npm ci + build</text>
  <text x="860" y="240" font-size="30" font-family="Arial, sans-serif" fill="#1c3b34">whynotmetoo.github.io</text>
  <text x="860" y="286" font-size="24" font-family="Arial, sans-serif" fill="#3b5f56">static output</text>
  <path d="M390 305 H430" stroke="#1f7468" stroke-width="6" stroke-linecap="round" />
  <path d="M760 305 H800" stroke="#1f7468" stroke-width="6" stroke-linecap="round" />
